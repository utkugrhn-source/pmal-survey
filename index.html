<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fafafa;--surface:#fff;--surface-alt:#f5f7fa;--border:#e2e5ea;--border-light:#eef0f3;--text:#1a1e26;--text-sec:#5a6270;--text-ter:#8b93a0;--accent:#1a5276;--accent-light:#d4e6f1;--accent-bg:#eaf2f8;--success:#0e6245;--success-bg:#e8f5e9;--warn:#b7791f;--warn-bg:#fef9e7;--radius:8px;--radius-lg:12px;--font-body:'DM Sans',system-ui,sans-serif;--font-head:'Source Serif 4','Georgia',serif;--shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 12px rgba(0,0,0,.08)}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:var(--font-body);color:var(--text);background:var(--bg);line-height:1.6}
[lang=ja] body,[lang=ko] body,[lang=zh] body{font-family:'Noto Sans JP','Noto Sans KR','Noto Sans SC',var(--font-body)}
[lang=ar] body{font-family:'Noto Sans Arabic',var(--font-body)}
[dir=rtl]{direction:rtl;text-align:right}
.wrap{max-width:720px;margin:0 auto;padding:1.5rem 1rem 6rem}

/* LANG PICKER PAGE */
.lang-page{text-align:center;padding:3rem 1rem}
.lang-page h2{font-family:var(--font-head);font-size:1.4rem;font-weight:600;margin-bottom:.5rem}
.lang-page p{font-size:.85rem;color:var(--text-sec);margin-bottom:2rem}
.lang-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.75rem;max-width:640px;margin:0 auto}
.lang-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem .75rem;cursor:pointer;transition:all .2s;text-align:center}
.lang-card:hover{border-color:var(--accent);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.lang-card .flag{font-size:1.6rem;margin-bottom:.4rem}
.lang-card .native{font-size:.85rem;font-weight:500;color:var(--text)}
.lang-card .name{font-size:.7rem;color:var(--text-ter);margin-top:2px}

/* LANG BADGE (small, corner) */
.lang-badge{position:fixed;top:12px;right:12px;z-index:200;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:.72rem;font-weight:600;cursor:pointer;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:6px;color:var(--text-sec);display:none}
.lang-badge:hover{border-color:var(--accent);color:var(--accent)}

/* HEADER */
.hdr{text-align:center;padding:2.5rem 0 2rem;border-bottom:1px solid var(--border-light);margin-bottom:2rem}
.hdr-badge{display:inline-block;font-size:.7rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);background:var(--accent-bg);padding:4px 14px;border-radius:20px;margin-bottom:1rem}
.hdr h1{font-family:var(--font-head);font-size:1.4rem;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:.5rem}
.hdr p{font-size:.85rem;color:var(--text-sec);max-width:540px;margin:0 auto}
.hdr-meta{display:flex;gap:1.5rem;justify-content:center;margin-top:1rem;flex-wrap:wrap}
.hdr-meta span{font-size:.75rem;color:var(--text-ter);display:flex;align-items:center;gap:4px}
.hdr-meta svg{width:14px;height:14px;stroke:var(--text-ter)}
.prog-wrap{position:sticky;top:0;z-index:100;background:var(--bg);padding:.75rem 0 .5rem;border-bottom:1px solid var(--border-light)}
.prog-bar-bg{height:4px;background:var(--border-light);border-radius:2px}.prog-bar{height:4px;background:var(--accent);border-radius:2px;transition:width .4s ease}
.prog-label{display:flex;justify-content:space-between;font-size:.7rem;color:var(--text-ter);margin-top:4px}
.sec{display:none}.sec.active{display:block}
.sec-badge{display:inline-block;font-size:.65rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);background:var(--accent-bg);padding:3px 10px;border-radius:14px;margin-bottom:.75rem}
.sec-title{font-family:var(--font-head);font-size:1.15rem;font-weight:600;color:var(--text);margin-bottom:1.5rem;padding-bottom:.75rem;border-bottom:1px solid var(--border-light)}
.q{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-bottom:1rem;transition:border-color .2s}.q:hover{border-color:#c8cdd4}
.q-label{font-size:.85rem;font-weight:500;color:var(--text);margin-bottom:.75rem;line-height:1.5}
.q-label .q-num{color:var(--text-ter);font-weight:400;margin-right:4px}
.q-hint{font-size:.75rem;color:var(--text-ter);margin-bottom:.75rem;font-style:italic}
.q-required{color:#c0392b;margin-left:2px}
.opts{display:flex;flex-direction:column;gap:6px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:8px 12px;border-radius:var(--radius);cursor:pointer;transition:background .15s}.opt:hover{background:var(--surface-alt)}
.opt input{margin-top:3px;accent-color:var(--accent);flex-shrink:0}
.opt label{font-size:.82rem;color:var(--text);cursor:pointer;line-height:1.45}
.txt,.sel{width:100%;padding:8px 12px;font-size:.82rem;font-family:var(--font-body);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);background:var(--surface);resize:vertical}.txt:focus,.sel:focus{outline:2px solid var(--accent);outline-offset:1px}
.case-box{background:var(--surface-alt);border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.5rem}
.case-title{font-family:var(--font-head);font-size:.95rem;font-weight:600;color:var(--text);margin-bottom:.5rem}
.case-desc{font-size:.82rem;color:var(--text-sec);line-height:1.6;margin-bottom:1rem}
.case-imgs{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.75rem}
.case-img-placeholder{aspect-ratio:1;background:var(--border-light);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:.75rem;color:var(--text-ter);text-align:center;padding:1rem;border:1px dashed var(--border)}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border-light)}
.btn{padding:10px 28px;font-size:.82rem;font-weight:500;font-family:var(--font-body);border-radius:var(--radius);cursor:pointer;transition:all .2s;border:none}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#154360}
.btn-secondary{background:transparent;color:var(--text-sec);border:1px solid var(--border)}.btn-secondary:hover{background:var(--surface-alt)}
.thankyou{text-align:center;padding:4rem 1rem}
.ty-icon{width:64px;height:64px;border-radius:50%;background:var(--success-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem}
.ty-icon svg{width:28px;height:28px;stroke:var(--success)}
.ty-h{font-family:var(--font-head);font-size:1.4rem;font-weight:600;color:var(--text);margin-bottom:.5rem}
.ty-p{font-size:.85rem;color:var(--text-sec);max-width:440px;margin:0 auto 2rem;line-height:1.6}
.info-box{background:var(--accent-bg);border:1px solid var(--accent-light);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.5rem;font-size:.8rem;color:var(--accent);line-height:1.55}
.q.invalid{border-color:#e74c3c;background:#fdf2f2}
.validation-msg{font-size:.72rem;color:#c0392b;margin-top:4px;display:none}.q.invalid .validation-msg{display:block}
.consent-box{background:var(--warn-bg);border:1px solid #f0e0a0;border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1.5rem}
.consent-box h3{font-family:var(--font-head);font-size:1rem;font-weight:600;margin-bottom:.75rem;color:var(--text)}
.consent-box p{font-size:.8rem;color:var(--text-sec);line-height:1.6;margin-bottom:.5rem}
.country-wrap{position:relative}.country-input{width:100%;padding:8px 12px;font-size:.82rem;font-family:var(--font-body);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);background:var(--surface)}.country-input:focus{outline:2px solid var(--accent);outline-offset:1px}
.country-list{position:absolute;top:100%;left:0;right:0;max-height:200px;overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);z-index:50;display:none;box-shadow:var(--shadow-sm)}.country-list.open{display:block}
.country-item{padding:7px 12px;font-size:.82rem;cursor:pointer;color:var(--text)}.country-item:hover{background:var(--accent-bg);color:var(--accent)}
.country-selected{font-size:.78rem;color:var(--accent);margin-top:4px;display:none}.country-selected.show{display:block}
@media(max-width:600px){.wrap{padding:1rem .75rem 5rem}.hdr h1{font-size:1.15rem}.q{padding:1rem}.case-imgs{grid-template-columns:1fr}.nav{flex-direction:column;gap:.75rem}.btn{width:100%;text-align:center}.lang-grid{grid-template-columns:repeat(3,1fr);gap:.5rem}}
</style>
</head>

ettiniz.", "en": "Thank you for your time. You have chosen not to participate.", "de": "Vielen Dank für Ihre Zeit. Sie haben sich gegen die Teilnahme entschieden.", "fr": "Merci de votre temps. Vous avez choisi de ne pas participer.", "es": "Gracias por su tiempo. Ha elegido no participar.", "it": "Grazie per il suo tempo. Ha scelto di non partecipare.", "pt": "Obrigado pelo seu tempo. Você optou por não participar.", "ru": "Спасибо за ваше время. Вы решили не участвовать.", "ja": "お時間をいただきありがとうございます。参加しないことを選択されました。", "ko": "시간 내주셔서 감사합니다. 참여하지 않기로 선택하셨습니다.", "zh": "感谢您的时间。您已选择不参与本调查。", "ar": "شكراً لوقتك. لقد اخترت عدم المشاركة."}, "ty_title": {"tr": "Teşekkürler", "en": "Thank You", "de": "Vielen Dank", "fr": "Merci", "es": "Gracias", "it": "Grazie", "pt": "Obrigado", "ru": "Спасибо", "ja": "ありがとうございます", "ko": "감사합니다", "zh": "感谢您", "ar": "شكراً لك"}, "ty_msg": {"tr": "Yanıtlarınız başarıyla kaydedilmiştir. Katkınız posterior malleol kırığı yönetimindeki güncel pratik varyasyonların daha iyi anlaşılmasına yardımcı olacaktır.", "en": "Your responses have been recorded successfully. Your contribution will help advance our understanding of current practice patterns in posterior malleolus fracture management.", "de": "Ihre Antworten wurden erfolgreich gespeichert. Ihr Beitrag wird dazu beitragen, aktuelle Praxismuster in der Behandlung von Volkmann-Dreieck-Frakturen besser zu verstehen.", "fr": "Vos réponses ont été enregistrées avec succès. Votre contribution aidera à mieux comprendre les pratiques actuelles dans la prise en charge des fractures de la malléole postérieure.", "es": "Sus respuestas han sido registradas exitosamente. Su contribución ayudará a comprender mejor los patrones de práctica actuales en el manejo de fracturas del maléolo posterior.", "it": "Le sue risposte sono state registrate con successo. Il suo contributo aiuterà a comprendere meglio le pratiche attuali nella gestione delle fratture del malleolo posteriore.", "pt": "Suas respostas foram registradas com sucesso. Sua contribuição ajudará a compreender melhor os padrões atuais de prática no tratamento de fraturas do maléolo posterior.", "ru": "Ваши ответы успешно записаны. Ваш вклад поможет лучше понять современные тенденции в лечении переломов заднего отростка большеберцовой кости.", "ja": "回答が正常に記録されました。ご協力は後果骨折管理における現在の診療パターンの理解を深めるのに役立ちます。", "ko": "응답이 성공적으로 기록되었습니다. 귀하의 기여는 후과 골절 관리의 현재 진료 패턴을 이해하는 데 도움이 될 것입니다.", "zh": "您的回答已成功记录。您的贡献将有助于增进对后踝骨折治疗当前实践模式的理解。", "ar": "تم تسجيل إجاباتك بنجاح. ستساعد مشاركتك في تحسين فهم أنماط الممارسة الحالية في علاج كسور الكعب الخلفي."}, "ty_contact": {"tr": "Bu çalışma hakkında sorularınız için:<br>Doç. Dr. Utku Gürhan — utku.gurhan@kyrenia.edu.tr", "en": "If you have questions about this study:<br>Assoc. Prof. Dr. Utku Gürhan — utku.gurhan@kyrenia.edu.tr", "de": "Bei Fragen zu dieser Studie:<br>Assoc. Prof. Dr. Utku Gürhan — utku.gurhan@kyrenia.edu.tr", "fr": "Pour toute question sur cette étude:<br>Prof. Assoc. Dr. Utku Gürhan — utku.gurhan@kyrenia.edu.tr", "es": "Para preguntas sobre este estudio:<br>Prof. Asoc. Dr. Utku Gürhan — utku.gurhan@kyrenia.edu.tr", "it": "Per domande su questo studio:<br>Prof. Assoc. Dr. Utku Gürhan — utku.gurhan@kyrenia.edu.tr", "pt": "Para dúvidas sobre este estudo:<br>Prof. Assoc. Dr. Utku Gürhan — utku.gurhan@kyrenia.edu.tr", "ru": "По вопросам об исследовании:<br>Доц. д-р Утку Гюрхан — utku.gurhan@kyrenia.edu.tr", "ja": "本研究に関するお問い合わせ:<br>Assoc. Prof. Dr. Utku Gürhan — utku.gurhan@kyrenia.edu.tr", "ko": "본 연구에 대한 문의:<br>Assoc. Prof. Dr. Utku Gürhan — utku.gurhan@kyrenia.edu.tr", "zh": "如有疑问请联系:<br>Assoc. Prof. Dr. Utku Gürhan — utku.gurhan@kyrenia.edu.tr", "ar": "للاستفسار عن هذه الدراسة:<br>Assoc. Prof. Dr. Utku Gürhan — utku.gurhan@kyrenia.edu.tr"}, "email_sep": {"tr": "(Bu bilgi anket yanıtlarınızla ilişkilendirilmeden ayrı tutulacaktır.)", "en": "(This will be stored separately and not linked to your survey responses.)", "de": "(Diese Information wird separat gespeichert und nicht mit Ihren Antworten verknüpft.)", "fr": "(Cette information sera stockée séparément et non liée à vos réponses.)", "es": "(Esta información se almacenará por separado y no se vinculará con sus respuestas.)", "it": "(Queste informazioni saranno conservate separatamente e non collegate alle risposte.)", "pt": "(Esta informação será armazenada separadamente e não vinculada às suas respostas.)", "ru": "(Эта информация будет храниться отдельно и не будет связана с вашими ответами.)", "ja": "（この情報は回答とは別に保管され、紐付けされません。）", "ko": "(이 정보는 설문 응답과 별도로 저장되며 연결되지 않습니다.)", "zh": "（此信息将单独存储，不会与您的问卷回答关联。）", "ar": "(ستُخزَّن هذه المعلومات بشكل منفصل ولن تُربط بإجاباتك.)"}, "case_info": {"tr": "Aşağıdaki senaryolar yaygın posterior malleol kırık paternlerini sunmaktadır. Her vaka için tercih ettiğiniz tedavi yaklaşımını belirtiniz.", "en": "The following scenarios present common posterior malleolus fracture patterns. Please indicate your preferred management for each case.", "de": "Die folgenden Szenarien zeigen häufige Frakturmuster des Volkmann-Dreiecks. Bitte geben Sie Ihre bevorzugte Behandlung an.", "fr": "Les scénarios suivants présentent des fractures typiques de la malléole postérieure. Veuillez indiquer votre prise en charge préférée.", "es": "Los siguientes escenarios presentan patrones comunes de fractura del maléolo posterior. Indique su manejo preferido.", "it": "I seguenti scenari presentano pattern comuni di frattura del malleolo posteriore. Indicare la gestione preferita.", "pt": "Os cenários a seguir apresentam padrões comuns de fratura do maléolo posterior. Indique seu tratamento preferido.", "ru": "Ниже представлены типичные паттерны переломов задней лодыжки. Укажите предпочтительную тактику лечения.", "ja": "以下は後果骨折の一般的なパターンを示すシナリオです。各症例について希望する治療法を示してください。", "ko": "다음은 일반적인 후과 골절 패턴을 제시한 시나리오입니다. 각 사례에 대한 선호 치료법을 표시해 주세요.", "zh": "以下场景展示了常见的后踝骨折模式。请指出您对每个病例的首选治疗方案。", "ar": "تعرض السيناريوهات التالية أنماط كسور شائعة للكعب الخلفي. يرجى تحديد أسلوب العلاج المفضل لديك."}, "case_img_ph": {"tr": "BT görüntüleri burada gösterilecektir (güncelleme bekleniyor)", "en": "CT images will be displayed here (imaging update pending)", "de": "CT-Bilder werden hier angezeigt (Bildaktualisierung ausstehend)", "fr": "Les images CT seront affichées ici (mise à jour en attente)", "es": "Las imágenes TC se mostrarán aquí (actualización pendiente)", "it": "Le immagini TC verranno visualizzate qui (aggiornamento in attesa)", "pt": "Imagens de TC serão exibidas aqui (atualização pendente)", "ru": "КТ-изображения будут показаны здесь (ожидается обновление)", "ja": "CT画像はここに表示されます（画像アップデート予定）", "ko": "CT 영상이 여기에 표시됩니다 (영상 업데이트 예정)", "zh": "CT影像将在此处显示（影像更新中）", "ar": "سيتم عرض صور الأشعة المقطعية هنا (بانتظار التحديث)"}};
const CON = {"title": {"tr": "Bilgilendirilmiş Onam", "en": "Informed Consent", "de": "Einverständniserklärung", "fr": "Consentement éclairé", "es": "Consentimiento informado", "it": "Consenso informato", "pt": "Consentimento informado", "ru": "Информированное согласие", "ja": "インフォームドコンセント", "ko": "사전 동의서", "zh": "知情同意书", "ar": "الموافقة المستنيرة"}, "p1": {"tr": "\"Posterior Malleol Kırığı Yönetiminde Güncel Eğilimler ve Pratik Varyasyon: Ortopedi Cerrahlarının Uluslararası Anketi\" başlıklı araştırma çalışmasına katılmaya davet edilmektesiniz.", "en": "You are invited to participate in a research study titled \"Current Trends and Practice Variation in Posterior Malleolus Fracture Management: An International Survey of Orthopaedic Surgeons.\"", "de": "Sie werden eingeladen, an einer Studie mit dem Titel „Aktuelle Trends und Praxisvariation bei der Behandlung von Volkmann-Dreieck-Frakturen: Eine internationale Umfrage\" teilzunehmen.", "fr": "Vous êtes invité(e) à participer à une étude intitulée « Tendances actuelles et variations pratiques dans la prise en charge des fractures de la malléole postérieure ».", "es": "Se le invita a participar en un estudio titulado \"Tendencias actuales y variación en la práctica del manejo de fracturas del maléolo posterior: una encuesta internacional\".", "it": "È invitato/a a partecipare a uno studio intitolato \"Tendenze attuali e variazioni nella gestione delle fratture del malleolo posteriore: un sondaggio internazionale\".", "pt": "Você está sendo convidado(a) a participar de um estudo intitulado \"Tendências atuais e variação na prática do tratamento de fraturas do maléolo posterior: uma pesquisa internacional\".", "ru": "Вы приглашены принять участие в исследовании «Современные тенденции и вариации в лечении переломов заднего отростка: международный опрос ортопедов».", "ja": "「後果骨折管理における現在の傾向と実践のバリエーション：整形外科医の国際調査」という研究にご参加いただくようお願い申し上げます。", "ko": "\"후과 골절 관리의 현재 동향 및 진료 변이: 정형외과 의사 대상 국제 설문조사\"라는 연구에 참여를 요청드립니다.", "zh": "诚邀您参加题为\"后踝骨折治疗的当前趋势与实践差异：骨科医生国际调查\"的研究。", "ar": "نود دعوتك للمشاركة في دراسة بحثية بعنوان \"الاتجاهات الحالية والتباين في الممارسة في علاج كسور الكعب الخلفي: استطلاع دولي لجراحي العظام\"."}, "p2": {"tr": "Bu çalışma Dr. Suat Günsel Girne Üniversitesi Hastanesi Ortopedi ve Travmatoloji Bölümü tarafından yürütülmektedir. Çalışma Girne Üniversitesi Klinik Araştırmalar Etik Kurulu tarafından onaylanmıştır.", "en": "This survey is conducted by the Department of Orthopaedic and Traumatology Surgery, Dr. Suat Günsel Kyrenia University Hospital, Cyprus. The study has been approved by the Kyrenia University Clinical Research Ethics Committee.", "de": "Diese Umfrage wird von der Abteilung für Orthopädie und Unfallchirurgie des Dr. Suat Günsel Kyrenia Universitätskrankenhauses, Zypern, durchgeführt. Die Studie wurde von der Ethikkommission der Universität Kyrenia genehmigt.", "fr": "Cette enquête est menée par le Département de Chirurgie Orthopédique et Traumatologique de l'Hôpital Universitaire Dr. Suat Günsel de Kyrenia, Chypre. L'étude a été approuvée par le Comité d'Éthique.", "es": "Esta encuesta es realizada por el Departamento de Cirugía Ortopédica y Traumatología del Hospital Universitario Dr. Suat Günsel Kyrenia, Chipre. El estudio ha sido aprobado por el Comité de Ética.", "it": "Questo sondaggio è condotto dal Dipartimento di Chirurgia Ortopedica e Traumatologica dell'Ospedale Universitario Dr. Suat Günsel Kyrenia, Cipro. Lo studio è stato approvato dal Comitato Etico.", "pt": "Esta pesquisa é conduzida pelo Departamento de Cirurgia Ortopédica e Traumatológica do Hospital Universitário Dr. Suat Günsel Kyrenia, Chipre. O estudo foi aprovado pelo Comitê de Ética.", "ru": "Исследование проводится отделением ортопедии и травматологии Университетской больницы им. д-ра Суата Гюнселя, Кирения, Кипр. Исследование одобрено этическим комитетом.", "ja": "本調査はキプロス・キレニア大学病院整形外科・外傷外科部門により実施されています。本研究はキレニア大学臨床研究倫理委員会の承認を受けています。", "ko": "본 설문조사는 키프로스 키레니아 대학교 병원 정형외과 및 외상외과에서 수행합니다. 본 연구는 키레니아 대학교 임상연구 윤리위원회의 승인을 받았습니다.", "zh": "本调查由塞浦路斯凯里尼亚大学医院骨科与创伤外科进行。本研究已获凯里尼亚大学临床研究伦理委员会批准。", "ar": "يتم إجراء هذا الاستطلاع من قبل قسم جراحة العظام والكسور في مستشفى جامعة كيرينيا، قبرص. تمت الموافقة على الدراسة من قبل لجنة الأخلاقيات."}, "purpose": {"tr": "<strong>Amaç:</strong> Posterior malleol kırıklarında güncel cerrahi karar verme süreçlerini uluslararası düzeyde karakterize etmek.", "en": "<strong>Purpose:</strong> To characterise contemporary surgical decision-making for posterior malleolus fractures across an international cohort.", "de": "<strong>Ziel:</strong> Aktuelle chirurgische Entscheidungsprozesse bei Volkmann-Dreieck-Frakturen international zu charakterisieren.", "fr": "<strong>Objectif:</strong> Caractériser la prise de décision chirurgicale contemporaine pour les fractures de la malléole postérieure à l'échelle internationale.", "es": "<strong>Objetivo:</strong> Caracterizar la toma de decisiones quirúrgicas contemporánea para fracturas del maléolo posterior a nivel internacional.", "it": "<strong>Scopo:</strong> Caratterizzare il processo decisionale chirurgico contemporaneo per le fratture del malleolo posteriore a livello internazionale.", "pt": "<strong>Objetivo:</strong> Caracterizar a tomada de decisão cirúrgica contemporânea para fraturas do maléolo posterior em âmbito internacional.", "ru": "<strong>Цель:</strong> Охарактеризовать современную хирургическую тактику при переломах задней лодыжки на международном уровне.", "ja": "<strong>目的:</strong> 後果骨折に対する現代の外科的意思決定を国際的に特徴づけること。", "ko": "<strong>목적:</strong> 후과 골절에 대한 현대 외과적 의사결정을 국제적으로 특성화하는 것.", "zh": "<strong>目的：</strong>在国际范围内表征后踝骨折的当代手术决策过程。", "ar": "<strong>الهدف:</strong> توصيف اتخاذ القرارات الجراحية المعاصرة لكسور الكعب الخلفي على المستوى الدولي."}, "participation": {"tr": "<strong>Katılım:</strong> Anket 9 bölümde 27 sorudan oluşmakta olup yaklaşık 8–10 dakika sürmektedir. Katılım tamamen gönüllü ve anonimdir.", "en": "<strong>Participation:</strong> The survey consists let currentLang = null;
let currentSection = -1; // -1 = lang picker
const TOTAL = SECTIONS.length;
let answers = {};

function t(obj) {
  if (!obj) return '';
  if (typeof obj === 'string') return obj;
  return obj[currentLang] || obj.en || obj.tr || '';
}

function showLangPicker() { currentSection = -1; renderAll(); }

function selectLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;
  document.documentElement.dir = LANGS[lang].dir;
  currentSection = 0;
  renderAll();
  const badge = document.getElementById('langBadge');
  badge.style.display = 'flex';
  document.getElementById('langFlag').textContent = LANGS[lang].flag;
  document.getElementById('langName').textContent = LANGS[lang].native;
}

function renderAll() {
  const app = document.getElementById('app');
  if (currentSection === -1) {
    // LANGUAGE PICKER
    document.getElementById('langBadge').style.display = 'none';
    let h = '<div class="lang-page">';
    h += '<div class="hdr-badge" style="margin-bottom:1.5rem">Posterior Malleolus Fracture Survey</div>';
    h += '<h2>' + t(UI.select_lang) + '</h2>';
    h += '<p style="color:var(--text-ter);font-size:.8rem;margin-bottom:2rem">' +
      Object.values(LANGS).map(l => l.native).join(' · ') + '</p>';
    h += '<div class="lang-grid">';
    for (const [code, info] of Object.entries(LANGS)) {
      h += `<div class="lang-card" onclick="selectLang('${code}')">
        <div class="flag">${info.flag}</div>
        <div class="native">${info.native}</div>
        <div class="name">${info.name}</div>
      </div>`;
    }
    h += '</div></div>';
    app.innerHTML = h;
    return;
  }

  let html = '';

  // Header
  html += `<div class="hdr">
    <div class="hdr-badge">${t(UI.badge)}</div>
    <h1>${t(UI.title)}</h1>

      <span><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg> ${t(UI.ethics_label)}</span>

        sh += `<textarea class="txt" name="${qq.id}" rows="3" placeholder="${t(UI.optional_ph)}"></textarea>`;
      } else if (qq.type === 'email') {
        if (qq.note) sh += `<div class="q-hint" style="font-style:normal;color:var(--text-ter)">${t(UI.email_sep)}</div>`;
        sh += `<input type="email" class="txt" name="${qq.id}" placeholder="email@example.com">`;
      } else if (qq.type === 'country') {
        sh += `<div class="country-wrap"><input type="text" class="country-input" id="country-search" autocomplete="off" placeholder="${t(UI.country_ph)}">`;
        sh += `<input type="hidden" name="${qq.id}" id="country-val">`;
        sh += `<div class="country-selected" id="country-sel"></div>`;
        sh += `<div class="country-list" id="country-list">`;
        const sorted = [...COUNTRIES].sort((a,b) => a.en.localeCompare(b.en));
        sorted.forEach(c => { sh += `<div class="country-item" data-v="${c.en}">${c.en}</div>`; });
        sh += `</div></div>`;
        if(qq.req) sh += `<div class="validation-msg">${t(UI.required_msg)}</div>`;
      }
      sh += `</div>`;
    });
    const isLast = si === SECTIONS.length - 1;
    sh += `<div class="nav"><button class="btn btn-secondary" onclick="prevSection()">${t(UI.back)}</button>`;
    sh += isLast ? `<button class="btn btn-primary" onclick="submitSurvey()">${t(UI.submit_btn)}</button>` : `<button class="btn btn-primary" onclick="nextSection()">${t(UI.cont)}</button>`;
    sh += `</div></div>`;
    html += sh;
  });

  // Thank you
  html += `<div class="sec ${currentSection===TOTAL+1?'active':''}" data-sec="${TOTAL+1}"><div class="thankyou">
    <div class="ty-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg></div>
    <div class="ty-h">${t(UI.ty_title)}</div><div class="ty-p">${t(UI.ty_msg)}</div>
    <div class="ty-p" style="font-size:.78rem;color:var(--text-ter)">${t(UI.ty_contact)}</div></div></div>`;

  app.innerHTML = html;
  restoreAnswers();
  bindEvents();
}

// ====================================================================
// NAVIGATION & VALIDATION
// ====================================================================
function getVal(name) {
  const cbs = document.querySelectorAll('input[name="'+name+'"][type="checkbox"]:checked');
  if(cbs.length) return Array.from(cbs).map(c=>c.value);
  const r = document.querySelector('input[name="'+name+'"]:checked');
  if(r) return r.value;
  const h = document.querySelector('input[name="'+name+'"][type="hidden"]');
  if(h && h.value) return h.value;
  const tx = document.querySelector('textarea[name="'+name+'"], input[type="email"][name="'+name+'"], input[type="text"][name="'+name+'"]');
  return tx ? tx.value : '';
}

function getRequired(secIdx) {
  if(secIdx===0) return ['consent'];
  const sec = SECTIONS[secIdx-1];
  return sec ? sec.questions.filter(q=>q.req).map(q=>q.id) : [];
}

function validateSection(secIdx) {
  const fields = getRequired(secIdx);
  let valid = true;
  fields.forEach(name => {
    const val = getVal(name);
    const qEl = document.getElementById('q-'+name);
    if(!qEl) return;
    const empty = Array.isArray(val) ? val.length===0 : !val;
    if(empty){qEl.classList.add('invalid');valid=false;} else {qEl.classList.remove('invalid');}
  });
  if(secIdx===0){
    const cv=getVal('consent');
    if(cv==='no'){alert(t(UI.no_participate));return false;}
    if(!cv){document.getElementById('q-consent').classList.add('invalid');return false;}
  }
  return valid;
}

function showSection(idx) {
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  const el=document.querySelector('.sec[data-sec="'+idx+'"]');
  if(el) el.classList.add('active');
  currentSection=idx;
  // Update progress bar
  const pct=idx===0?0:Math.round((idx/TOTAL)*100);
  const bar=document.querySelector('.prog-bar');
  if(bar) bar.style.width=pct+'%';
  const labels=document.querySelectorAll('.prog-label span');
  if(labels[0]) labels[0].textContent=idx===0?t(UI.consent_label):idx>TOTAL?t(UI.complete_label):t(UI.section_label)+idx+t(UI.of_label)+TOTAL;
  if(labels[1]) labels[1].textContent=pct+'%';
  window.scrollTo({top:0,behavior:'smooth'});
}

function saveAnswers() {
  document.querySelectorAll('input[type="radio"]:checked').forEach(el=>{answers[el.name]=el.value;});
  document.querySelectorAll('input[type="checkbox"]:checked').forEach(el=>{
    if(!answers[el.name])answers[el.name]=[];if(!answers[el.name].includes(el.value))answers[el.name].push(el.value);
  });
  document.querySelectorAll('input[type="checkbox"]:not(:checked)').forEach(el=>{
    if(answers[el.name])answers[el.name]=answers[el.name].filter(v=>v!==el.value);
  });
  document.querySelectorAll('textarea,input[type="email"],input[type="text"],input[type="hidden"]').forEach(el=>{
    if(el.name)answers[el.name]=el.value;
  });
}

function restoreAnswers() {
  Object.keys(answers).forEach(name=>{
    const val=answers[name];
    if(Array.isArray(val)){val.forEach(v=>{const el=document.querySelector('input[name="'+name+'"][value="'+v+'"]');if(el)el.checked=true;});}
    else{
      const r=document.querySelector('input[name="'+name+'"][value="'+val+'"]');
      if(r){r.checked=true;return;}
      const h=document.querySelector('input[name="'+name+'"][type="hidden"]');if(h)h.value=val;
      const tx=document.querySelector('textarea[name="'+name+'"],input[type="email"][name="'+name+'"],input[type="text"][name="'+name+'"]');
      if(tx)tx.value=val;
    }
  });
  if(answers['A6']){const sel=document.getElementById('country-sel');if(sel){sel.textContent=t(UI.country_sel)+' '+answers['A6'];sel.classList.add('show');}}
  ['C1','D2'].forEach(name=>{const o=document.getElementById(name+'other');if(!o)return;
    if(name==='D2'){const cb=document.querySelector('input[name="D2"][value="Other"]:checked');o.style.display=cb?'block':'none';}
    else{const r=document.querySelector('input[name="'+name+'"]:checked');o.style.display=(r&&r.value==='Other')?'block':'none';}
  });
}

function nextSection(){
  if(!validateSection(currentSection)){const fi=document.querySelector('.sec.active .q.invalid');if(fi)fi.scrollIntoView({behavior:'smooth',block:'center'});return;}
  saveAnswers();showSection(currentSection+1);
}
function prevSection(){if(currentSection>0){saveAnswers();showSection(currentSection-1);}}

function bindEvents() {
  document.addEventListener('change',function(e){
    if(e.target.name==='C1'){const o=document.getElementById('C1other');if(o)o.style.display=e.target.value==='Other'?'block':'none';}
    if(e.target.name==='D2'&&e.target.value==='Other'){const o=document.getElementById('D2other');if(o)o.style.display=e.target.checked?'block':'none';}
    const q=e.target.closest('.q');if(q)q.classList.remove('invalid');
  });
  const cs=document.getElementById('country-search'),cl=document.getElementById('country-list'),cv=document.getElementById('country-val'),csel=document.getElementById('country-sel');
  if(cs&&cl){
    cs.addEventListener('focus',()=>{cl.classList.add('open');});
    cs.addEventListener('input',()=>{const q=cs.value.toLowerCase();cl.querySelectorAll('.country-item').forEach(i=>{i.style.display=i.textContent.toLowerCase().includes(q)?'':'none';});cl.classList.add('open');});
    cl.addEventListener('click',(e)=>{const item=e.target.closest('.country-item');if(!item)return;const v=item.getAttribute('data-v');cv.value=v;cs.value='';csel.textContent=t(UI.country_sel)+' '+v;csel.classList.add('show');cl.classList.remove('open');const qEl=cs.closest('.q');if(qEl)qEl.classList.remove('invalid');});
    document.addEventListener('click',(e)=>{if(!e.target.closest('.country-wrap'))cl.classList.remove('open');});
  }
}

// ====================================================================
// SUBMIT
// ====================================================================
const SHEETS_WEBHOOK = '';

function collectData(){
  const data={timestamp:new Date().toISOString(),language:currentLang};
  const all=['consent',...SECTIONS.flatMap(s=>s.questions.flatMap(q=>{const ids=[q.id];if(q.hasOther)ids.push(q.id+'_other');return ids;}))];
  all.forEach(n=>{let v=getVal(n);if(Array.isArray(v))v=v.join('; ');data[n]=v;});
  return data;
}

async function submitSurvey(){
  if(!validateSection(currentSection)){const fi=document.querySelector('.sec.active .q.invalid');if(fi)fi.scrollIntoView({behavior:'smooth',block:'center'});return;}
  saveAnswers();const data=collectData();
  if(SHEETS_WEBHOOK){try{await fetch(SHEETS_WEBHOOK,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});}catch(e){}}
  try{const ex=JSON.parse(localStorage.getItem('pmal_responses')||'[]');ex.push(data);localStorage.setItem('pmal_responses',JSON.stringify(ex));}catch(e){}
  showSection(TOTAL+1);
}

// Init — show language picker
renderAll();
</script>
