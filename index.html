//  3) SeriesDescription regex — least reliable because PACS technicians mis-label
//     (observed in the field: Case 2 "MPR sag" descriptions on coronal reformats).
function detectPlane({ iop, desc, ippDelta }) {
  // 1) Stacking axis (authoritative when available)
  if (ippDelta && Array.isArray(ippDelta) && ippDelta.length === 3) {
    const abs = ippDelta.map(Math.abs);
    const total = abs[0] + abs[1] + abs[2];
    if (total > 1) { // non-degenerate delta
      const maxI = abs.indexOf(Math.max(...abs));
      const dominance = abs[maxI] / total;
      // High-confidence axis alignment (≥0.5 of total variation on one axis)
      if (dominance >= 0.5) {
        return ['sagittal', 'coronal', 'axial'][maxI];
      }
    }
  }
  // 2) IOP normal cross product
  if (iop) {
    const v = iop.split('\\').map(Number);
    if (v.length >= 6 && v.every(x => !isNaN(x))) {
      const ax = [
        v[1] * v[5] - v[2] * v[4],
        v[2] * v[3] - v[0] * v[5],
        v[0] * v[4] - v[1] * v[3]
      ];
      const abs = ax.map(Math.abs);
      const maxA = Math.max(...abs);
      if (maxA > 0.85) {
        const i = abs.indexOf(maxA);
        return ['sagittal', 'coronal', 'axial'][i];
      }
    }
  }
  // 3) Description regex (last resort; PACS labels unreliable)
  if (desc) {
    const d = desc.toLowerCase();
    if (/(^|\W)(sag|sagittal)(\W|$)/.test(d)) return 'sagittal';
    if (/(^|\W)(cor|coronal)(\W|$)/.test(d)) return 'coronal';
    if (/(^|\W)(ax|axial|tra|transverse)(\W|$)/.test(d)) return 'axial';
  }
  return 'axial';
}

// Single viewport for one series
function DicomSeriesViewer({
  files,
  plane,
  label,
  tool,
  setTool,
  wlPreset,
  setWlPreset,
  invert,
  setInvert,
  onReset,
  measureActive,
  fullscreen,
  setFullscreen,
  isMobile,
  lang
}) {
  const containerRef = useRef(null);
  const canvasOverlayRef = useRef(null);
  const stateRef = useRef({
    idx: 0, ids: [], cache: {}, mounted: true,
    measurePoints: [], lastViewport: null
  });
  const [loading, setLoading] = useState(true);
  const [loadProgress, setLoadProgress] = useState(0);
  const [error, setError] = useState(null);
  const [info, setInfo] = useState({ cur: 0, tot: 0, ww: 0, wc: 0, zoom: 1 });
  const [measurement, setMeasurement] = useState(null);
  const [measurePointCount, setMeasurePointCount] = useState(0);

  // Load series
  useEffect(() => {
    if (!containerRef.current || !files || files.length === 0 || typeof cornerstone === 'undefined') return;
    const el = containerRef.current;
    const st = stateRef.current;
    st.mounted = true;
    st.idx = 0;
    st.cache = {};
    st.measurePoints = [];
    setMeasurement(null);
    setMeasurePointCount(0);
    setLoading(true);
    setError(null);

    (async () => {
      try {
        cornerstone.enable(el);
        st.ids = files.map(f => `wadouri:${R2_BASE}${f.key}`);

        const img = await cornerstone.loadImage(st.ids[0]);
        if (!st.mounted) return;
        st.cache[0] = img;
        cornerstone.displayImage(el, img);

        // Fit image to window — ensures large images (e.g. foot extending
        // beyond frame) are centered and fully visible at initial view.
        try { cornerstone.fitToWindow(el); } catch (ex) {}

        const vp = cornerstone.getViewport(el);
        if (invert) vp.invert = true;
        if (wlPreset) {
          vp.voi.windowWidth = wlPreset.ww;
          vp.voi.windowCenter = wlPreset.wc;
        }
        // Ensure translation is zeroed (fitToWindow may leave small offsets)
        vp.translation = { x: 0, y: 0 };
        cornerstone.setViewport(el, vp);

        setInfo({
          cur: 1, tot: st.ids.length,
          ww: Math.round(vp.voi.windowWidth),
          wc: Math.round(vp.voi.windowCenter),
          zoom: vp.scale
        });
        setLoading(false);

        // Aggressive preload with concurrency limit: loads ALL slices in background
        // Priority: nearest to current index first (outward spiral)
        st.preloadActive = true;
        const CONCURRENCY = 4;
        const queue = [];
        const total = st.ids.length;
        // Build an "outward from center" queue starting from idx 0
        for (let d = 1; d < total; d++) {
          if (st.idx + d < total) queue.push(st.idx + d);
          if (st.idx - d >= 0) queue.push(st.idx - d);
        }
        let loaded = 1;
        let running = 0;
        const tick = () => {
          if (!st.mounted || !st.preloadActive) return;
          while (running < CONCURRENCY && queue.length > 0) {
            const i = queue.shift();
            if (st.cache[i]) { continue; }
            running++;
            cornerstone.loadImage(st.ids[i]).then(im => {
              if (!st.mounted) return;
              st.cache[i] = im;
              loaded++;
              setLoadProgress(Math.round(loaded / total * 100));
            }).catch(() => {}).finally(() => {
              running--;
              tick();
            });
          }
        };
        tick();
      } catch (e) {
        if (st.mounted) setError(e.message || 'Load failed');
      }
    })();

    return () => {
      st.mounted = false;
      st.preloadActive = false;
      try { cornerstone.disable(el); } catch (ex) {}
    };
  }, [files]);

  // Clear measurements when entering/leaving measure mode
  useEffect(() => {
    if (!containerRef.current) return;
    stateRef.current.measurePoints = [];
    setMeasurement(null);
    setMeasurePointCount(0);
    // Redraw canvas overlay to wipe old lines
    requestAnimationFrame(() => {
      const overlay = canvasOverlayRef.current;
      if (overlay) {
        const ctx = overlay.getContext('2d');
        ctx && ctx.clearRect(0, 0, overlay.width, overlay.height);
      }
    });
  }, [measureActive]);

  // Apply W/L preset
  useEffect(() => {
    const el = containerRef.current;
    if (!el || loading || !wlPreset) return;
    try {
      const vp = cornerstone.getViewport(el);
      vp.voi.windowWidth = wlPreset.ww;
      vp.voi.windowCenter = wlPreset.wc;
      cornerstone.setViewport(el, vp);
      setInfo(p => ({ ...p, ww: wlPreset.ww, wc: wlPreset.wc }));
    } catch (e) {}
  }, [wlPreset]);

  // Apply invert
  useEffect(() => {
    const el = containerRef.current;
    if (!el || loading) return;
    try {
      const vp = cornerstone.getViewport(el);
      vp.invert = invert;
      cornerstone.setViewport(el, vp);
    } catch (e) {}
  }, [invert]);

  // Display a specific slice
  const showSlice = useCallback(async (ni) => {
    const el = containerRef.current;
    const st = stateRef.current;
    if (!el || ni < 0 || ni >= st.ids.length) return;
    st.idx = ni;
    try {
      let img = st.cache[ni];
      if (!img) {
        img = await cornerstone.loadImage(st.ids[ni]);
        if (!st.mounted) return;
        st.cache[ni] = img;
      }
      cornerstone.displayImage(el, img);
      const vp = cornerstone.getViewport(el);
      setInfo(p => ({
        ...p,
        cur: ni + 1,
        ww: Math.round(vp.voi.windowWidth),
        wc: Math.round(vp.voi.windowCenter),
        zoom: vp.scale
      }));
      // Preload neighbors
      for (let j = 1; j <= 3; j++) {
        [ni + j, ni - j].forEach(pi => {
          if (pi >= 0 && pi < st.ids.length && !st.cache[pi]) {
            cornerstone.loadImage(st.ids[pi]).then(im => { st.cache[pi] = im; }).catch(() => {});
          }
        });
      }
      // Redraw measurement overlay
      drawMeasurementOverlay();
    } catch (e) {}
  }, []);

  // Reset handler
  useEffect(() => {
    if (onReset) onReset.current = () => {
      const el = containerRef.current;
      if (!el || loading) return;
      try {
        // Fit image back to viewport first, then apply preset/invert
        try { cornerstone.fitToWindow(el); } catch (ex) {}
        const vp = cornerstone.getViewport(el);
        vp.translation = { x: 0, y: 0 };
        vp.invert = false;
        if (wlPreset) {
          vp.voi.windowWidth = wlPreset.ww;
          vp.voi.windowCenter = wlPreset.wc;
        }
        cornerstone.setViewport(el, vp);
        stateRef.current.measurePoints = [];
        setMeasurement(null);
        setMeasurePointCount(0);
        drawMeasurementOverlay();
        setInfo(p => ({
          ...p,
          ww: Math.round(vp.voi.windowWidth),
          wc: Math.round(vp.voi.windowCenter),
          zoom: 1
        }));
        setInvert(false);
      } catch (e) {}
    };
  }, [onReset, loading, wlPreset, setInvert]);

  // Pointer-position to image-coordinates converter
  const pageToImage = (pageX, pageY) => {
    const el = containerRef.current;
    if (!el) return null;
    const rect = el.getBoundingClientRect();
    const x = pageX - rect.left;
    const y = pageY - rect.top;
    try {
      return cornerstone.pageToPixel(el, pageX, pageY);
    } catch (e) {
      return { x, y };
    }
  };

  // Draw measurement overlay on canvas
  const drawMeasurementOverlay = useCallback(() => {
    const overlay = canvasOverlayRef.current;
    const el = containerRef.current;
    if (!overlay || !el) return;
    const rect = el.getBoundingClientRect();
    overlay.width = rect.width;
    overlay.height = rect.height;
    const ctx = overlay.getContext('2d');
    ctx.clearRect(0, 0, overlay.width, overlay.height);

    const pts = stateRef.current.measurePoints;
    if (pts.length === 0) return;

    // Convert image coords back to canvas coords via cornerstone viewport
    const toCanvas = (imgX, imgY) => {
      try {
        return cornerstone.pixelToCanvas(el, { x: imgX, y: imgY });
      } catch (e) {
        return { x: imgX, y: imgY };
      }
    };

    ctx.strokeStyle = '#FFB547';
    ctx.fillStyle = '#FFB547';
    ctx.lineWidth = 2;
    ctx.font = 'bold 13px -apple-system, sans-serif';

    // Draw points as circles
    pts.forEach(p => {
      const c = toCanvas(p.x, p.y);
      ctx.beginPath();
      ctx.arc(c.x, c.y, 4, 0, Math.PI * 2);
      ctx.fill();
    });

    // Draw lines between consecutive points
    if (pts.length >= 2) {
      ctx.beginPath();
      const c0 = toCanvas(pts[0].x, pts[0].y);
      ctx.moveTo(c0.x, c0.y);
      for (let i = 1; i < pts.length; i++) {
        const c = toCanvas(pts[i].x, pts[i].y);
        ctx.lineTo(c.x, c.y);
      }
      ctx.stroke();
    }

    // Compute and show measurement
    const img = cornerstone.getEnabledElement(el).image;
    const ps = (img && img.columnPixelSpacing) || 1;
    if (pts.length === 2) {
      const dx = (pts[1].x - pts[0].x) * ps;
      const dy = (pts[1].y - pts[0].y) * ps;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const unit = (img && img.columnPixelSpacing) ? 'mm' : 'px';
      const text = `${dist.toFixed(1)} ${unit}`;
      const mid = toCanvas((pts[0].x + pts[1].x) / 2, (pts[0].y + pts[1].y) / 2);
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.fillRect(mid.x + 8, mid.y - 18, ctx.measureText(text).width + 10, 22);
      ctx.fillStyle = '#FFB547';
      ctx.fillText(text, mid.x + 13, mid.y - 3);
      setMeasurement(text);
    } else if (pts.length === 3) {
      // Angle at pts[1] between pts[0]->pts[1] and pts[2]->pts[1]
      const v1x = pts[0].x - pts[1].x, v1y = pts[0].y - pts[1].y;
      const v2x = pts[2].x - pts[1].x, v2y = pts[2].y - pts[1].y;
      const m1 = Math.sqrt(v1x * v1x + v1y * v1y);
      const m2 = Math.sqrt(v2x * v2x + v2y * v2y);
      const cos = (v1x * v2x + v1y * v2y) / (m1 * m2);
      const ang = Math.acos(Math.max(-1, Math.min(1, cos))) * 180 / Math.PI;
      const text = `${ang.toFixed(1)}°`;
      const c = toCanvas(pts[1].x, pts[1].y);
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.fillRect(c.x + 12, c.y - 22, ctx.measureText(text).width + 10, 22);
      ctx.fillStyle = '#FFB547';
      ctx.fillText(text, c.x + 17, c.y - 7);
      setMeasurement(text);
    }
  }, []);

  // Cornerstone image rendered -> redraw overlay
  useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    const handler = () => drawMeasurementOverlay();
    el.addEventListener('cornerstoneimagerendered', handler);
    return () => el.removeEventListener('cornerstoneimagerendered', handler);
  }, [drawMeasurementOverlay]);

  // Mouse and touch handlers
  useEffect(() => {
    const el = containerRef.current;
    if (!el || loading) return;
    const st = stateRef.current;

    let dragging = false;
    let startX = 0, startY = 0;
    let startWW = 0, startWC = 0, startScale = 1;
    let startTx = 0, startTy = 0;
    let activeTool = tool;
    let pinchStart = 0, pinchScaleStart = 1;
    let touchLastY = 0;

    const getViewport = () => { try { return cornerstone.getViewport(el); } catch (e) { return null; } };
    const setViewport = (vp) => { try { cornerstone.setViewport(el, vp); } catch (e) {} };

    // Mouse wheel = scroll slices (disabled during measurement to preserve points)
    const onWheel = async (e) => {
      e.preventDefault();
      if (measureActive) return;
      const dir = e.deltaY > 0 ? 1 : -1;
      const ni = Math.max(0, Math.min(st.ids.length - 1, st.idx + dir));
      if (ni === st.idx) return;
      showSlice(ni);
    };

    const onDown = (e) => {
      if (measureActive) {
        const p = pageToImage(e.clientX, e.clientY);
        if (!p) return;
        if (st.measurePoints.length >= 3) st.measurePoints = [];
        st.measurePoints.push(p);
        setMeasurePointCount(st.measurePoints.length);
        if (st.measurePoints.length < 2) setMeasurement(null);
        drawMeasurementOverlay();
        e.preventDefault();
        return;
      }
      dragging = true;
      startX = e.clientX;
      startY = e.clientY;
      activeTool = tool;
      const vp = getViewport();
      if (!vp) return;
      startWW = vp.voi.windowWidth;
      startWC = vp.voi.windowCenter;
      startScale = vp.scale;
      startTx = vp.translation.x;
      startTy = vp.translation.y;
      e.preventDefault();
    };

    const onMove = (e) => {
      if (!dragging) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      const vp = getViewport();
      if (!vp) return;

      if (activeTool === 'wl') {
        vp.voi.windowWidth = Math.max(1, startWW + dx * 2);
        vp.voi.windowCenter = startWC + dy * 2;
      } else if (activeTool === 'zoom') {
        vp.scale = Math.max(0.1, Math.min(10, startScale * Math.pow(1.01, -dy)));
      } else if (activeTool === 'pan') {
        vp.translation.x = startTx + dx / vp.scale;
        vp.translation.y = startTy + dy / vp.scale;
      }
      setViewport(vp);
      setInfo(p => ({
        ...p,
        ww: Math.round(vp.voi.windowWidth),
        wc: Math.round(vp.voi.windowCenter),
        zoom: vp.scale
      }));
    };

    const onUp = () => { dragging = false; };

    // Touch handlers
    const onTouchStart = (e) => {
      if (measureActive && e.touches.length === 1) {
        const t = e.touches[0];
        const p = pageToImage(t.clientX, t.clientY);
        if (!p) return;
        if (st.measurePoints.length >= 3) st.measurePoints = [];
        st.measurePoints.push(p);
        setMeasurePointCount(st.measurePoints.length);
        if (st.measurePoints.length < 2) setMeasurement(null);
        drawMeasurementOverlay();
        e.preventDefault();
        return;
      }
      if (e.touches.length === 1) {
        dragging = true;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        touchLastY = startY;
        const vp = getViewport();
        if (!vp) return;
        startWW = vp.voi.windowWidth;
        startWC = vp.voi.windowCenter;
        activeTool = tool === 'wl' ? 'scroll' : tool;  // default single-touch = scroll slices
      } else if (e.touches.length === 2) {
        dragging = false;
        const t1 = e.touches[0], t2 = e.touches[1];
        pinchStart = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
        const vp = getViewport();
        if (vp) {
          pinchScaleStart = vp.scale;
          startTx = vp.translation.x;
          startTy = vp.translation.y;
          startX = (t1.clientX + t2.clientX) / 2;
          startY = (t1.clientY + t2.clientY) / 2;
        }
      }
      e.preventDefault();
    };

    const onTouchMove = (e) => {
      if (e.touches.length === 1 && dragging) {
        const cx = e.touches[0].clientX;
        const cy = e.touches[0].clientY;
        if (activeTool === 'scroll') {
          // Swipe vertical = scroll slices (disabled during measurement)
          if (measureActive) { e.preventDefault(); return; }
          const dy = cy - touchLastY;
          if (Math.abs(dy) > 6) {
            const dir = dy > 0 ? 1 : -1;
            const ni = Math.max(0, Math.min(st.ids.length - 1, st.idx + dir));
            if (ni !== st.idx) showSlice(ni);
            touchLastY = cy;
          }
        } else {
          const dx = cx - startX, dy = cy - startY;
          const vp = getViewport();
          if (!vp) return;
          if (activeTool === 'wl') {
            vp.voi.windowWidth = Math.max(1, startWW + dx * 2);
            vp.voi.windowCenter = startWC + dy * 2;
          } else if (activeTool === 'pan') {
            vp.translation.x = startTx + dx / vp.scale;
            vp.translation.y = startTy + dy / vp.scale;
          }
          setViewport(vp);
          setInfo(p => ({
            ...p,
            ww: Math.round(vp.voi.windowWidth),
            wc: Math.round(vp.voi.windowCenter),
            zoom: vp.scale
          }));
        }
      } else if (e.touches.length === 2) {
        const t1 = e.touches[0], t2 = e.touches[1];
        const dist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
        const cx = (t1.clientX + t2.clientX) / 2;
        const cy = (t1.clientY + t2.clientY) / 2;
        const vp = getViewport();
        if (!vp) return;
        // Pinch zoom
        vp.scale = Math.max(0.1, Math.min(10, pinchScaleStart * (dist / pinchStart)));
        // Two-finger pan
        vp.translation.x = startTx + (cx - startX) / vp.scale;
        vp.translation.y = startTy + (cy - startY) / vp.scale;
        setViewport(vp);
        setInfo(p => ({ ...p, zoom: vp.scale }));
      }
      e.preventDefault();
    };

    const onTouchEnd = (e) => {
      dragging = false;
      if (e.touches.length === 0) pinchStart = 0;
    };

    el.addEventListener('wheel', onWheel, { passive: false });
    el.addEventListener('mousedown', onDown);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    el.addEventListener('touchstart', onTouchStart, { passive: false });
    el.addEventListener('touchmove', onTouchMove, { passive: false });
    el.addEventListener('touchend', onTouchEnd);
    el.addEventListener('touchcancel', onTouchEnd);

    return () => {
      el.removeEventListener('wheel', onWheel);
      el.removeEventListener('mousedown', onDown);
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      el.removeEventListener('touchstart', onTouchStart);
      el.removeEventListener('touchmove', onTouchMove);
      el.removeEventListener('touchend', onTouchEnd);
      el.removeEventListener('touchcancel', onTouchEnd);
    };
  }, [tool, loading, measureActive, showSlice, drawMeasurementOverlay]);

  // Slice slider
  const onSliderChange = (e) => {
    if (measureActive) return;
    const ni = parseInt(e.target.value);
    showSlice(ni);
  };

  // Keyboard shortcuts
  useEffect(() => {
    if (!containerRef.current) return;
    const onKey = (e) => {
      if (loading) return;
      // Only when viewer is focused or hovered
      const el = containerRef.current;
      if (!el) return;
      const rect = el.getBoundingClientRect();
      const isHovered = document.elementFromPoint(rect.left + rect.width / 2, rect.top + rect.height / 2) === el
        || el.contains(document.activeElement);
      if (!isHovered && !fullscreen) return;
      // Don't steal focus if typing
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

      if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
        if (measureActive) { e.preventDefault(); return; }
        showSlice(Math.max(0, stateRef.current.idx - 1));
        e.preventDefault();
      } else if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
        if (measureActive) { e.preventDefault(); return; }
        showSlice(Math.min(stateRef.current.ids.length - 1, stateRef.current.idx + 1));
        e.preventDefault();
      } else if (e.key === '+' || e.key === '=') {
        const vp = cornerstone.getViewport(el);
        vp.scale = Math.min(10, vp.scale * 1.15);
        cornerstone.setViewport(el, vp);
        setInfo(p => ({ ...p, zoom: vp.scale }));
        e.preventDefault();
      } else if (e.key === '-' || e.key === '_') {
        const vp = cornerstone.getViewport(el);
        vp.scale = Math.max(0.1, vp.scale / 1.15);
        cornerstone.setViewport(el, vp);
        setInfo(p => ({ ...p, zoom: vp.scale }));
        e.preventDefault();
      } else if (e.key.toLowerCase() === 'i') {
        setInvert(!invert);
        e.preventDefault();
      } else if (e.key.toLowerCase() === 'r') {
        if (onReset.current) onReset.current();
        e.preventDefault();
      } else if (e.key.toLowerCase() === 'f') {
        setFullscreen(!fullscreen);
        e.preventDefault();
      } else if (e.key >= '1' && e.key <= '4') {
        const preset = WL_PRESETS[parseInt(e.key) - 1];
        if (preset) setWlPreset(preset);
        e.preventDefault();
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [loading, invert, fullscreen, measureActive, showSlice, setInvert, setFullscreen, setWlPreset, onReset]);

  // Viewer JSX (all createElement form)
  const h = React.createElement;
  const height = fullscreen ? '100vh' : (isMobile ? 340 : 420);

  return h('div', {
    className: 'relative bg-black',
    style: { height: height, overflow: 'hidden' }
  },
    // Plane label (top-left)
    h('div', {
      className: 'absolute top-2 left-2 z-20 text-xs font-bold px-2 py-1 rounded',
      style: { background: 'rgba(0,0,0,0.6)', color: '#FFB547' }
    }, label),
    // Info overlay (top-right)
    !loading && h('div', {
      className: 'absolute top-2 right-2 z-20 text-xs font-mono text-gray-300 text-right',
      style: { background: 'rgba(0,0,0,0.6)', padding: '4px 8px', borderRadius: 4 }
